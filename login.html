<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal Beauty — Acceso Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="page-login">

<!-- LEFT PANEL -->
<div class="login-left">
  <div class="login-deco login-deco-1"></div>
  <div class="login-deco login-deco-2"></div>
  <div class="login-brand">
    <div class="login-brand-logo">
      Eternal<em>Beauty</em>
    </div>
    <p class="login-brand-sub">Studio &amp; Spa</p>
    <div class="login-brand-divider"></div>
    <p class="login-brand-desc">Panel de administración exclusivo para el equipo de Eternal Beauty Studio.</p>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="login-right">
  <div class="login-box">
    <h1 class="login-title">Bienvenida, <em>Admin</em></h1>
    <p class="login-sub">Accede para gestionar tu agenda y reservas</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="admin@eternalbeauty.com" autocomplete="email">
        <span class="input-icon">✉</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <span class="input-icon">🔒</span>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Ingresar al panel</span>
      <div class="loading-spinner"></div>
    </button>

    <a href="index.html" class="back-link">← Volver al sitio</a>
  </div>
</div>

<script type="module">
  import { auth } from "./firebase-config.js";
  import {
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "admin.html";
  });

  window.doLogin = async function () {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const errBox   = document.getElementById("errorMsg");

    errBox.classList.remove("show");
    if (!email || !password) {
      errBox.textContent = "Por favor ingresa tu correo y contraseña.";
      errBox.classList.add("show");
      return;
    }

    btn.classList.add("loading");
    btn.disabled = true;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "admin.html";
    } catch (err) {
      const msgs = {
        "auth/user-not-found":     "Usuario no encontrado.",
        "auth/wrong-password":     "Contraseña incorrecta.",
        "auth/invalid-email":      "Correo no válido.",
        "auth/too-many-requests":  "Demasiados intentos. Espera un momento.",
        "auth/invalid-credential": "Credenciales incorrectas."
      };
      errBox.textContent = msgs[err.code] || "Error al iniciar sesión. Intenta de nuevo.";
      errBox.classList.add("show");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  };

  document.getElementById("password")?.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
