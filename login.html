<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal Beauty — Acceso Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose:       #ed6887;
    --rose-dark:  #da3b5d;
    --rose-light: #f6c1cc;
    --beige:      #f5e6d3;
    --beige-dark: #d6c2a8;
    --text-dark:  #3a3333;
    --text-mid:   #1d1c1c;
    --text-light: #201f1fd0;
    --white:      #ffffff;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans:  'Jost', sans-serif;
  }

  body {
    font-family: var(--font-sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--beige);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: linear-gradient(145deg, var(--rose) 0%, var(--rose-dark) 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 48px;
    position: relative;
    overflow: hidden;
  }
  .left-panel::before {
    content: "";
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .left-deco {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.07);
  }
  .left-deco-1 { width: 300px; height: 300px; top: -80px; right: -80px; }
  .left-deco-2 { width: 200px; height: 200px; bottom: -40px; left: -60px; }

  .brand { position: relative; text-align: center; }
  .brand-logo {
    font-family: var(--font-serif);
    font-size: 42px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 3px;
    line-height: 1.1;
  }
  .brand-logo em { font-style: italic; opacity: 0.85; display: block; }
  .brand-sub {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .brand-divider {
    width: 40px; height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 32px auto;
  }
  .brand-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
    text-align: center;
    max-width: 280px;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    display: flex; align-items: center; justify-content: center;
    padding: 60px 48px;
  }
  .login-box {
    width: 100%; max-width: 400px;
  }
  .login-title {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 300;
    color: var(--text-dark);
    margin-bottom: 6px;
  }
  .login-title em { font-style: italic; color: var(--rose); }
  .login-sub {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
    font-weight: 400;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--beige-dark);
    font-size: 16px;
    pointer-events: none;
    transition: color 0.3s;
  }
  .form-group input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--beige-dark);
    border-radius: 6px;
    padding: 13px 16px 13px 42px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dark);
    outline: none;
    transition: all 0.3s;
  }
  .form-group input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(237,104,135,0.12);
  }
  .form-group input:focus ~ .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--rose); }

  .error-msg {
    background: rgba(237,104,135,0.08);
    border: 1px solid rgba(237,104,135,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--rose-dark);
    margin-bottom: 20px;
    display: none;
  }
  .error-msg.show { display: block; }

  .btn-login {
    width: 100%;
    background: var(--rose);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 15px;
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 4px;
    position: relative;
  }
  .btn-login:hover { background: var(--rose-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(218,59,93,0.25); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-light);
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .back-link:hover { color: var(--rose); }

  .loading-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .loading-spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left-panel { padding: 48px 32px; min-height: 260px; }
    .brand-logo { font-size: 32px; }
    .right-panel { padding: 40px 24px; }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="left-deco left-deco-1"></div>
  <div class="left-deco left-deco-2"></div>
  <div class="brand">
    <div class="brand-logo">
      Eternal<em>Beauty</em>
    </div>
    <p class="brand-sub">Studio &amp; Spa</p>
    <div class="brand-divider"></div>
    <p class="brand-desc">Panel de administración exclusivo para el equipo de Eternal Beauty Studio.</p>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-box">
    <h1 class="login-title">Bienvenida, <em>Admin</em></h1>
    <p class="login-sub">Accede para gestionar tu agenda y reservas</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="admin@eternalbeuty.com" autocomplete="email">
        <span class="input-icon">✉</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <span class="input-icon">🔒</span>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Ingresar al panel</span>
      <div class="loading-spinner"></div>
    </button>

    <a href="index.html" class="back-link">← Volver al sitio</a>
  </div>
</div>

<script type="module">
  import { auth } from "./firebase-config.js";
  import {
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // Si ya está logueado, redirigir
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "admin.html";
  });

  window.doLogin = async function () {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const errBox   = document.getElementById("errorMsg");

    errBox.classList.remove("show");
    if (!email || !password) {
      errBox.textContent = "Por favor ingresa tu correo y contraseña.";
      errBox.classList.add("show");
      return;
    }

    btn.classList.add("loading");
    btn.disabled = true;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "admin.html";
    } catch (err) {
      const msgs = {
        "auth/user-not-found":    "Usuario no encontrado.",
        "auth/wrong-password":    "Contraseña incorrecta.",
        "auth/invalid-email":     "Correo no válido.",
        "auth/too-many-requests": "Demasiados intentos. Espera un momento.",
        "auth/invalid-credential":"Credenciales incorrectas."
      };
      errBox.textContent = msgs[err.code] || "Error al iniciar sesión. Intenta de nuevo.";
      errBox.classList.add("show");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  };

  // Enter key
  document.getElementById("password")?.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
